spring.application.name=fpms

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fpms}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

app.jwt.secret=${JWT_SECRET:fpms-dev-secret-change-in-production-minimum-256-bits-long-key}
app.jwt.expiration-ms=86400000

app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000}

server.port=${PORT:8080}